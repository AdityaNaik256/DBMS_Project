<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament &amp; League Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- ===== SIDEBAR NAV ===== -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo-icon">🏆</span>
      <span class="logo-text">TournamentMS</span>
    </div>
    <ul class="nav-list">
      <li><a href="#" class="nav-link active" data-page="dashboard">
        <span class="nav-icon">📊</span> Dashboard
      </a></li>
      <li><a href="#" class="nav-link" data-page="tournaments">
        <span class="nav-icon">🏆</span> Tournaments
      </a></li>
      <li><a href="#" class="nav-link" data-page="teams">
        <span class="nav-icon">👥</span> Teams
      </a></li>
      <li><a href="#" class="nav-link" data-page="players">
        <span class="nav-icon">⚽</span> Players
      </a></li>
      <li><a href="#" class="nav-link" data-page="matches">
        <span class="nav-icon">📅</span> Matches
      </a></li>
    </ul>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">&#9776;</button>
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
    </header>

    <main class="content" id="content">
      <div class="loader-wrap" id="globalLoader">
        <div class="loader"></div>
      </div>
    </main>
  </div>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" hidden>
    <div class="modal-box">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
